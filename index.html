<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historia Filmów</title>
    <meta name="description" content="Historia filmów z repertuaru." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Kino</p>
          <h1>Historyczne filmy</h1>
          <p id="history-summary" class="summary">Ładowanie historii…</p>
        </div>
        <label class="search-field" for="search-input">
          <span>Szukaj</span>
          <input id="search-input" type="search" placeholder="Tytuł, rok, Filmweb" autocomplete="off" />
        </label>
      </header>

      <section class="history-panel">
        <div id="status-message" class="status-message" aria-live="polite">Pobieranie danych…</div>
        <div id="history-table-wrapper" class="history-table-wrapper" hidden>
          <table class="history-table">
            <thead>
              <tr>
                <th scope="col">Tytuł</th>
                <th scope="col">Rok</th>
                <th scope="col">Ocena Filmweb</th>
                <th scope="col">Zaplanowano</th>
                <th scope="col">Zarchiwizowano</th>
                <th scope="col">Link</th>
              </tr>
            </thead>
            <tbody id="history-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <template id="history-row-template">
      <tr>
        <td class="history-title"></td>
        <td class="history-year"></td>
        <td class="history-rating"></td>
        <td class="history-scheduled"></td>
        <td class="history-archived"></td>
        <td><a class="history-link" target="_blank" rel="noopener noreferrer">Filmweb</a></td>
      </tr>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
